spring.application.name=Knowvera
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
server.port=${SERVER_PORT}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Cache (Caffeine). CacheConfig provides the CacheManager bean.
spring.cache.type=caffeine

# Mail (used for reservation notifications)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS:false}
spring.mail.default-encoding=UTF-8
app.mail.from=${MAIL_FROM:no-reply@knowvera.local}
app.verification.base-url=${VERIFY_BASE_URL:http://localhost:8080}
app.verification.token-ttl-hours=${VERIFY_TOKEN_TTL_HOURS:24}
app.verification.cleanup-ms=${VERIFY_TOKEN_CLEANUP_MS:3600000}

# Email probe (SMTP verify) - best effort, may be blocked by providers
app.email-probe.mode=${EMAIL_PROBE_MODE:soft}
app.email-probe.timeout-ms=${EMAIL_PROBE_TIMEOUT_MS:3000}
app.email-probe.helo=${EMAIL_PROBE_HELO:knowvera.local}
app.email-probe.mail-from=${EMAIL_PROBE_FROM:no-reply@knowvera.local}
